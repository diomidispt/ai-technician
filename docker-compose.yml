# Local dev stack: frontend (Vite) + backend (FastAPI) + postgres (pgvector).
#
# The LLM + embeddings run in **Ollama on your Mac host** (not in Docker) — Metal-accelerated
# and free. The backend container reaches it via host.docker.internal:11434.
# Start Ollama first:  ollama serve
#   ollama pull aya-expanse:8b bge-m3    (answers + embeddings)
#   ollama pull llama3.2:3b              (optional: fast model for the multi-turn query rewrite)

services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      CORS_ORIGINS: "http://localhost:5173"
      AWS_REGION: "eu-central-1"
      DATABASE_URL: "postgresql+psycopg://postgres:postgres@postgres:5432/jensen"
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      ANSWER_MODEL: "aya-expanse:8b"  # multilingual (Greek+English); llama3.2:3b = faster/English
      EMBED_MODEL: "bge-m3"          # multilingual embeddings (cross-lingual retrieval)
      EMBED_DIM: "1024"             # bge-m3 dimension (must match the embeddings)
      REWRITE_MODEL: "llama3.2:3b"   # small/fast model for the multi-turn query rewrite
      OLLAMA_KEEP_ALIVE: "30m"       # keep models resident between questions (no reload lag)
    volumes:
      - ./backend/app:/app/app
      - ./ingestion/sample_docs:/docs   # drop PDFs here, then `make ingest`
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      # Inside compose the browser still hits localhost; Vite proxies /api to the
      # backend service (see vite.config.ts). Override target for container-to-container.
      VITE_API_PROXY_TARGET: "http://backend:8000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jensen
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jensen"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
