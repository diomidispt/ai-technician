# Local dev stack.
#
# Phase 1 (now): backend (FastAPI streaming stub) + frontend (Vite dev server).
# Later phases uncomment postgres+pgvector and minio (S3) — see CLAUDE.md §Commands.

services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      CORS_ORIGINS: "http://localhost:5173"
      AWS_REGION: "eu-central-1"
    volumes:
      - ./backend/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      # Inside compose the browser still hits localhost; Vite proxies /api to the
      # backend service (see vite.config.ts). Override target for container-to-container.
      VITE_API_PROXY_TARGET: "http://backend:8000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend

