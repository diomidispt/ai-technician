# Placeholder — path-filtered backend CI. Runs tests now; deploy steps added in the
# containerize/deploy phase (CLAUDE.md §6). AWS auth will be OIDC, no long-lived keys.
name: ci-backend

on:
  push:
    branches: [main]
    paths: ["backend/**", "shared/**", ".github/workflows/ci-backend.yml"]
  pull_request:
    paths: ["backend/**", "shared/**", ".github/workflows/ci-backend.yml"]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest -q
  # deploy:  # added later — docker build → push ECR → aws lambda update-function-code
